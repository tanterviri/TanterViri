<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>TANTERcreativity</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #f5f5f5;
      background: #000000;
    }

    /* Шапка */
    .hero {
      min-height: 50vh;
      background: url("images/hero.jpg") center/cover no-repeat #000000;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
    }

    .hero-content {
      background: rgba(0, 0, 0, 0.6);
      padding: 20px 30px;
      border-radius: 16px;
      max-width: 90%;
    }

    .hero h1 {
      font-size: 52px;
      letter-spacing: 0.15em;
      margin: 0;
    }

    .hero p {
      margin-top: 10px;
      margin-bottom: 0;
      color: #aaaaaa;
    }

    /* Фон ниже — темный градиент */
    main {
      background: linear-gradient(to bottom, #101010 0%, #1b1b1b 50%, #252525 100%);
    }

    .section {
      padding: 40px 20px;
    }

    .section h2 {
      margin-top: 0;
    }

    .dark-1 {
      background: rgba(20, 20, 20, 0.9);
    }

    .dark-2 {
      background: rgba(35, 35, 35, 0.9);
    }

    /* Контейнер для кнопок */
    .contacts-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 16px;
    }

    /* Галерея картинок (старая авто-галерея) */
    .gallery {
      margin-top: 20px;
      display: grid;
      grid-template-columns: repeat(4, minmax(120px, 1fr));
      gap: 16px;
    }

    .gallery img {
      width: 100%;
      aspect-ratio: 4 / 3;
      display: block;
      border-radius: 8px;
      object-fit: cover;
      background: #2a2a2a;
    }

    /* Творческая галерея (карточки) */
    .creative-gallery-container {
      margin-top: 20px;
      display: grid;
      grid-template-columns: repeat(3, minmax(220px, 1fr));
      gap: 18px;
    }

    .creative-item {
      background: #111111;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 3px 10px rgba(0, 0, 0, 0.7);
      display: flex;
      flex-direction: column;
    }

    .creative-item img {
      width: 100%;
      height: auto;
      display: block;
      object-fit: cover;
      background: #222222;
    }

    .creative-body {
      padding: 10px 12px 12px;
      font-size: 14px;
    }

    .creative-title {
      font-weight: 600;
      margin-bottom: 4px;
    }

    .creative-meta {
      font-size: 12px;
      opacity: 0.75;
      margin-bottom: 6px;
    }

    .creative-desc {
      font-size: 13px;
      line-height: 1.35;
      opacity: 0.9;
    }

    .creative-tags {
      font-size: 11px;
      opacity: 0.7;
      margin-top: 6px;
    }

    /* Кнопки */
    button {
      background: #4caf50;
      color: white;
      border: none;
      padding: 10px 16px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }

    button:hover {
      background: #45a049;
    }

    /* ===== АДАПТИВ ===== */

    /* Планшеты */
    @media (max-width: 1024px) {
      .gallery {
        grid-template-columns: repeat(3, minmax(100px, 1fr));
      }

      .creative-gallery-container {
        grid-template-columns: repeat(2, minmax(200px, 1fr));
      }
    }

    /* Малые планшеты / большие телефоны */
    @media (max-width: 768px) {
      .gallery {
        grid-template-columns: repeat(2, minmax(120px, 1fr));
      }

      .creative-gallery-container {
        grid-template-columns: 1fr 1fr;
      }

      .hero h1 {
        font-size: 40px;
        letter-spacing: 0.1em;
      }

      .section {
        padding: 32px 16px;
      }
    }

    /* Телефоны */
    @media (max-width: 480px) {
      .gallery {
        grid-template-columns: 1fr;
      }

      .creative-gallery-container {
        grid-template-columns: 1fr;
      }

      .hero h1 {
        font-size: 32px;
        letter-spacing: 0.08em;
      }

      .hero-content {
        padding: 16px 18px;
      }

      .section {
        padding: 24px 16px;
      }

      .contacts-buttons {
        flex-direction: column;
        align-items: stretch;
      }

      button {
        width: 100%;
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <div class="hero">
    <div class="hero-content">
      <h1>TANTERcreativity</h1>
      <p>Творчество в темных тонах</p>
    </div>
  </div>

  <main>
    <!-- ПЕРВАЯ секция: контакты -->
    <section class="section dark-1">
      <h2>Связаться со мной</h2>
      <p>Выбери удобный способ, чтобы отправить свои работы.</p>

      <div class="contacts-buttons">
        <button onclick="window.open('https://t.me/Tannter', '_blank')">Telegram</button>
        <button onclick="window.open('https://vk.com/tannter', '_blank')">VK</button>
      </div>
    </section>

    <!-- ВТОРАЯ секция: ТВОРЧЕСКАЯ ГАЛЕРЕЯ (карточки с описаниями) -->
    <section class="section dark-2">
      <h2>Творческая галерея</h2>
      <p>Серия работ в темных тонах: название, автор, год и короткая история каждой работы.</p>

      <div class="creative-gallery-container" id="creativeGallery">
        <!-- Сюда JS подставит карточки из creative.json -->
      </div>
    </section>

    <!-- ТРЕТЬЯ секция: исходная авто-галерея из images.json -->
    <section class="section dark-1">
      <h2>Галерея работ</h2>
      <p>Быстрый просмотр всех изображений без описаний.</p>

      <div class="gallery" id="autoGallery">
        <!-- Сюда JS сам добавит картинки -->
      </div>
    </section>
  </main>

  <script>
    // Старая авто-галерея по images.json (как у тебя было)
    async function loadGallery() {
      try {
        const response = await fetch('images/images.json');
        if (!response.ok) {
          console.error('Не могу получить images.json', response.status);
          return;
        }

        const files = await response.json(); // массив имён файлов
        const container = document.getElementById('autoGallery');
        if (!container) return;

        container.innerHTML = '';

        files.forEach((fileName) => {
          const img = document.createElement('img');
          img.src = 'images/' + fileName;
          img.alt = fileName;
          img.className = 'slot';
          container.appendChild(img);
        });
      } catch (e) {
        console.error('Ошибка при загрузке галереи', e);
      }
    }

    // Новая творческая галерея по creative.json
    async function loadCreativeGallery() {
      try {
        const response = await fetch('images/creative.json');
        if (!response.ok) {
          console.error('Не могу получить creative.json', response.status);
          return;
        }

        const items = await response.json(); // массив объектов работ
        const container = document.getElementById('creativeGallery');
        if (!container) return;

        container.innerHTML = '';

        items.forEach(item => {
          const card = document.createElement('div');
          card.className = 'creative-item';

          const img = document.createElement('img');
          img.src = 'images/' + item.file;
          img.alt = item.title || item.file;

          const body = document.createElement('div');
          body.className = 'creative-body';

          const title = document.createElement('div');
          title.className = 'creative-title';
          title.textContent = item.title || item.file;

          const meta = document.createElement('div');
          meta.className = 'creative-meta';
          meta.textContent = [item.author, item.year].filter(Boolean).join(' • ');

          const desc = document.createElement('div');
          desc.className = 'creative-desc';
          desc.textContent = item.description || '';

          const tags = document.createElement('div');
          tags.className = 'creative-tags';
          if (Array.isArray(item.tags) && item.tags.length > 0) {
            tags.textContent = '#' + item.tags.join(' #');
          } else {
            tags.textContent = '';
          }

          body.appendChild(title);
          if (meta.textContent) body.appendChild(meta);
          if (desc.textContent) body.appendChild(desc);
          if (tags.textContent) body.appendChild(tags);

          card.appendChild(img);
          card.appendChild(body);
          container.appendChild(card);
        });
      } catch (e) {
        console.error('Ошибка при загрузке творческой галереи', e);
      }
    }

    loadGallery();
    loadCreativeGallery();
  </script>
</body>
</html>
